<svg viewBox="0 0 700 500" xmlns="http://www.w3.org/2000/svg" font-family="'Share Tech Mono', monospace">
  <style>
    text { fill: #1a1a1a; }
    .label { font-size: 11px; fill: #1a1a1a; }
    .title { font-size: 18px; font-weight: bold; fill: #1a1a1a; }
    .subtitle { font-size: 11px; fill: #555; }
    .value { font-size: 9px; fill: #e8803a; }
    .component { font-size: 10px; fill: #1a1a1a; font-weight: bold; }
    line, path, polyline { stroke: #1a1a1a; fill: none; }
    circle.node { fill: #1a1a1a; stroke: none; }
    circle.open { fill: white; stroke: #1a1a1a; stroke-width: 1.5; }
  </style>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" class="title">Telecaster Passive Wiring</text>
  <text x="350" y="48" text-anchor="middle" class="subtitle">Everything inside the guitar body — before the signal reaches the amp</text>

  <!-- ===================== PICKUPS ===================== -->

  <!-- Bridge pickup -->
  <text x="42" y="115" text-anchor="middle" class="component">Bridge</text>
  <text x="42" y="127" text-anchor="middle" class="component">Pickup</text>
  <rect x="22" y="135" width="40" height="60" rx="4" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- coil squiggle -->
  <path d="M42,145 c5,4 5,8 0,12 c-5,4 -5,8 0,12 c5,4 5,8 0,12" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- hot out -->
  <line x1="62" y1="150" x2="100" y2="150" stroke-width="1.5"/>
  <circle cx="62" cy="150" r="2" class="open"/>
  <text x="72" y="143" class="value">hot</text>
  <!-- ground out -->
  <line x1="62" y1="180" x2="100" y2="180" stroke-width="1.5"/>
  <line x1="100" y1="180" x2="100" y2="430" stroke-width="1.5"/>
  <circle cx="62" cy="180" r="2" class="open"/>
  <text x="72" y="192" class="value">gnd</text>

  <!-- Neck pickup -->
  <text x="42" y="255" text-anchor="middle" class="component">Neck</text>
  <text x="42" y="267" text-anchor="middle" class="component">Pickup</text>
  <rect x="22" y="275" width="40" height="60" rx="4" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- coil squiggle -->
  <path d="M42,285 c5,4 5,8 0,12 c-5,4 -5,8 0,12 c5,4 5,8 0,12" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- hot out -->
  <line x1="62" y1="290" x2="100" y2="290" stroke-width="1.5"/>
  <circle cx="62" cy="290" r="2" class="open"/>
  <text x="72" y="283" class="value">hot</text>
  <!-- ground out -->
  <line x1="62" y1="320" x2="100" y2="320" stroke-width="1.5"/>
  <line x1="100" y1="320" x2="100" y2="430" stroke-width="1.5"/>
  <circle cx="62" cy="320" r="2" class="open"/>
  <text x="72" y="332" class="value">gnd</text>

  <!-- ===================== 3-WAY SWITCH ===================== -->

  <text x="190" y="195" text-anchor="middle" class="component">3-Way</text>
  <text x="190" y="207" text-anchor="middle" class="component">Switch</text>

  <!-- Switch body -->
  <rect x="160" y="215" width="60" height="100" rx="6" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>

  <!-- Input lugs (left side) -->
  <!-- Bridge input -->
  <line x1="100" y1="150" x2="160" y2="240" stroke-width="1.5"/>
  <circle cx="160" cy="240" r="3" class="node"/>
  <text x="165" y="237" class="value">B</text>

  <!-- Neck input -->
  <line x1="100" y1="290" x2="160" y2="290" stroke-width="1.5"/>
  <circle cx="160" cy="290" r="3" class="node"/>
  <text x="165" y="287" class="value">N</text>

  <!-- Output lug (right side) — common -->
  <circle cx="220" cy="265" r="3" class="node"/>
  <text x="225" y="262" class="value">COM</text>

  <!-- Switch wiper -->
  <line x1="175" y1="265" x2="215" y2="265" stroke-width="2" stroke="#1a1a1a"/>
  <path d="M210,265 l-8,-4 l0,8 z" fill="#1a1a1a"/>

  <!-- Switch positions label -->
  <text x="190" y="330" text-anchor="middle" class="value">↑ Bridge</text>
  <text x="190" y="342" text-anchor="middle" class="value">— Both</text>
  <text x="190" y="354" text-anchor="middle" class="value">↓ Neck</text>

  <!-- ===================== VOLUME POT ===================== -->

  <!-- Wire from switch to volume -->
  <line x1="220" y1="265" x2="310" y2="265" stroke-width="1.5"/>

  <text x="370" y="195" text-anchor="middle" class="component">Volume</text>
  <text x="370" y="210" text-anchor="middle" class="value">250K</text>

  <!-- Pot body -->
  <circle cx="370" cy="265" r="35" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>

  <!-- Lug 3 (input) - left -->
  <circle cx="335" cy="265" r="3" class="node"/>
  <line x1="310" y1="265" x2="335" y2="265" stroke-width="1.5"/>
  <text x="338" y="255" class="value">3</text>

  <!-- Resistance element (arc inside pot) -->
  <path d="M340,245 c10,-8 20,-12 30,-12 c10,0 20,4 30,12" stroke="#1a1a1a" stroke-width="1" fill="none"/>
  <path d="M340,285 c10,8 20,12 30,12 c10,0 20,-4 30,-12" stroke="#1a1a1a" stroke-width="1" fill="none"/>

  <!-- Wiper (lug 2) - right, going to output -->
  <line x1="405" y1="265" x2="410" y2="265" stroke-width="1.5"/>
  <line x1="395" y1="255" x2="405" y2="265" stroke-width="1.5"/>
  <circle cx="410" cy="265" r="3" class="node"/>
  <text x="400" y="252" class="value">2</text>

  <!-- Lug 1 (ground) - bottom -->
  <circle cx="370" cy="300" r="3" class="node"/>
  <line x1="370" y1="300" x2="370" y2="430" stroke-width="1.5"/>
  <text x="378" y="310" class="value">1</text>

  <!-- ===================== TONE POT ===================== -->

  <!-- Tone pot connection - from volume lug 3 / switch output node -->
  <line x1="310" y1="265" x2="310" y2="380" stroke-width="1.5"/>
  <circle cx="310" cy="265" r="2.5" class="node"/>

  <text x="370" y="365" text-anchor="middle" class="component">Tone</text>
  <text x="370" y="378" text-anchor="middle" class="value">250K</text>

  <!-- Pot body -->
  <circle cx="370" cy="400" r="28" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>

  <!-- Lug 3 (input) - left -->
  <circle cx="342" cy="400" r="3" class="node"/>
  <line x1="310" y1="380" x2="310" y2="400" stroke-width="1.5"/>
  <line x1="310" y1="400" x2="342" y2="400" stroke-width="1.5"/>
  <text x="345" y="393" class="value">3</text>

  <!-- Wiper (lug 2) - right, going to cap -->
  <line x1="398" y1="400" x2="410" y2="400" stroke-width="1.5"/>
  <line x1="392" y1="392" x2="398" y2="400" stroke-width="1.5"/>
  <circle cx="410" cy="400" r="3" class="node"/>
  <text x="400" y="390" class="value">2</text>

  <!-- Lug 1 (ground) - bottom -->
  <circle cx="370" cy="428" r="3" class="node"/>
  <line x1="370" y1="428" x2="370" y2="430" stroke-width="1.5"/>
  <text x="378" y="440" class="value">1</text>

  <!-- ===================== TONE CAP ===================== -->

  <!-- Wire from tone wiper to cap -->
  <line x1="410" y1="400" x2="450" y2="400" stroke-width="1.5"/>

  <!-- Cap symbol -->
  <line x1="450" y1="385" x2="450" y2="415" stroke-width="2.5"/>
  <line x1="458" y1="385" x2="458" y2="415" stroke-width="2.5"/>
  <text x="454" y="378" text-anchor="middle" class="component">C1</text>
  <text x="454" y="428" text-anchor="middle" class="value">.047µF</text>

  <!-- Cap to ground -->
  <line x1="458" y1="400" x2="490" y2="400" stroke-width="1.5"/>
  <line x1="490" y1="400" x2="490" y2="430" stroke-width="1.5"/>

  <!-- ===================== OUTPUT JACK ===================== -->

  <!-- Wire from volume wiper to jack -->
  <line x1="410" y1="265" x2="580" y2="265" stroke-width="1.5"/>

  <text x="620" y="235" text-anchor="middle" class="component">Output</text>
  <text x="620" y="247" text-anchor="middle" class="component">Jack</text>

  <!-- Jack symbol -->
  <circle cx="620" cy="275" r="20" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  <!-- Tip contact -->
  <circle cx="620" cy="275" r="4" class="open"/>
  <line x1="580" y1="265" x2="600" y2="265" stroke-width="1.5"/>
  <line x1="600" y1="265" x2="616" y2="275" stroke-width="1.5"/>
  <text x="650" y="268" class="value">Tip</text>
  <text x="650" y="278" class="value">(hot)</text>

  <!-- Sleeve contact (ground) -->
  <line x1="620" y1="295" x2="620" y2="430" stroke-width="1.5"/>
  <text x="650" y="300" class="value">Sleeve</text>
  <text x="650" y="310" class="value">(gnd)</text>

  <!-- ===================== GROUND BUS ===================== -->

  <line x1="100" y1="430" x2="620" y2="430" stroke-width="2"/>
  <circle cx="100" cy="430" r="3" class="node"/>
  <circle cx="370" cy="430" r="3" class="node"/>
  <circle cx="490" cy="430" r="3" class="node"/>
  <circle cx="620" cy="430" r="3" class="node"/>

  <!-- Ground symbol -->
  <line x1="345" y1="445" x2="395" y2="445" stroke-width="2"/>
  <line x1="353" y1="451" x2="387" y2="451" stroke-width="1.5"/>
  <line x1="361" y1="457" x2="379" y2="457" stroke-width="1"/>
  <line x1="370" y1="430" x2="370" y2="445" stroke-width="2"/>
  <text x="370" y="472" text-anchor="middle" class="label">Ground</text>

  <!-- ===================== SIGNAL FLOW ARROWS ===================== -->
  <text x="135" y="155" class="value">→</text>
  <text x="265" y="260" class="value">→</text>
  <text x="495" y="260" class="value">→</text>

  <!-- Annotations -->
  <text x="310" y="155" text-anchor="middle" class="subtitle">Signal flow: Pickup → Switch → Volume → Jack</text>
  <text x="310" y="170" text-anchor="middle" class="subtitle">Tone shunt taps off before Volume wiper</text>

</svg>
